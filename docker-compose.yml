version: '3.8'

services:
  # 1. 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: gensokyo_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-gensokyo_committee}
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. FastAPI 后端服务
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gensokyo_backend
    restart: always
    depends_on:
      - postgres
    env_file:
    - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-healock}:${DB_PASSWORD:-Colae5249}@postgres:5432/${DB_NAME:-gensokyo_committee}
      - TZ=Asia/Shanghai
    ports:
      - "8003:8003"
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads

  # 3. Vue3
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gensokyo_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8004:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      
volumes:
  pg_data: